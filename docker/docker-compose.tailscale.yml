services:
  accord:
    image: node:22-slim
    restart: unless-stopped
    working_dir: /data
    command: npx -y -p @accord-kit/server@${ACCORD_VERSION:-0.1.2} accord-server
    environment:
      NODE_ENV: production
      ACCORD_ADDRESS: ${ACCORD_ADDRESS:-0.0.0.0}
      ACCORD_PORT: ${ACCORD_PORT:-1234}
      ACCORD_AUTH_MODE: ${ACCORD_AUTH_MODE:-key}
      ACCORD_DB_PATH: ${ACCORD_DB_PATH:-/data/accord.db}
      ACCORD_BINARY_DIR: ${ACCORD_BINARY_DIR:-/data/binary}
    volumes:
      - ${ACCORD_DATA_DIR:-/var/lib/accord-kit}:/data
      - npm-cache:/root/.npm
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started

  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: ${TAILSCALE_HOSTNAME:-accord-kit}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?TS_AUTHKEY is required}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---accept-routes=false}
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw

volumes:
  npm-cache:
  tailscale-state:
